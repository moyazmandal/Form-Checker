<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form-Checker
</title>
</head>
<body>

    <form action="#">
        <!-- checkbox -->
         <input id="subscribeCheck" type="checkbox">
         <label for="subscribeCheck">Subscribe</label><br><br>

         <!-- radio payment mathod -->
          
          <input type="radio" id="visaCard" name="paymentMathod">
          <label for="visaCard">Visa</label> <br>

          <input type="radio" id="masterCard" name="paymentMathod">
          <label for="masterCard">Master Card</label> <br>

          <input type="radio" id="paypalCard" name="paymentMathod">
          <label for="paypalCard">PayPal</label> <br>

          <button type="button" id="submitBtn">Submit</button>
    </form>
    <!-- output -->
<h3 id="subscribeOutput" >--------</h3>
<h3 id="paymentOutput">--------</h3>


<script src="main.js"></script>

</body>
</html>
